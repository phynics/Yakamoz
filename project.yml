name: Yakamoz
options:
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ALWAYS_SEARCH_USER_PATHS: NO
    # PositronicKit's SwiftPM products are built for the host arch only, so build
    # Yakamoz for the active arch too (avoids x86_64 module-resolution failures on
    # Apple Silicon). This is a local dev/showcase app, not a universal release.
    ONLY_ACTIVE_ARCH: YES
    # Tests use `@testable import YakamozCore`, which requires the framework to be
    # built with -enable-testing.
    ENABLE_TESTABILITY: YES
packages:
  PositronicKit:
    path: ../PositronicKit
targets:
  Yakamoz:
    type: application
    platform: macOS
    sources:
      - Sources/Yakamoz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atakandulker.Yakamoz
        PRODUCT_NAME: Yakamoz
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: YakamozCore
  YakamozCore:
    type: framework
    platform: macOS
    sources:
      - Sources/YakamozCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atakandulker.YakamozCore
        PRODUCT_NAME: YakamozCore
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: PositronicKit
        product: PositronicKit
      - package: PositronicKit
        product: PKShared
      - package: PositronicKit
        product: PKPrompt
      - package: PositronicKit
        product: PKOpenAIProvider
      - package: PositronicKit
        product: PKOpenRouterProvider
      - package: PositronicKit
        product: PKOllamaProvider
  YakamozTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/YakamozTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atakandulker.YakamozTests
        PRODUCT_NAME: YakamozTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: YakamozCore
      - package: PositronicKit
        product: PKTestSupport
schemes:
  Yakamoz:
    build:
      targets:
        Yakamoz: all
        YakamozCore: all
    test:
      targets:
        - YakamozTests
