name: Yakamoz
options:
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ALWAYS_SEARCH_USER_PATHS: NO
    # PositronicKit's SwiftPM products are built for the host arch only, so build
    # Yakamoz for the active arch too (avoids x86_64 module-resolution failures on
    # Apple Silicon). This is a local dev/showcase app, not a universal release.
    ONLY_ACTIVE_ARCH: YES
    # Tests use `@testable import YakamozCore`, which requires the framework to be
    # built with -enable-testing.
    ENABLE_TESTABILITY: YES
packages:
  PositronicKit:
    path: ../PositronicKit
  # Pin the transitive swift-json-schema to the same version PositronicKit builds
  # against (its Package.resolved pins 0.11.2 — verify against
  # ../PositronicKit/Package.resolved before bumping, don't assume). Without this,
  # Yakamoz can resolve a different release and the workspace ends up with a
  # mismatched JSONSchema builder API between the app and its embedded package
  # graph (this previously broke the build inside the dependency itself, e.g.
  # OrderedDictionary vs [String: JSONValue]).
  swift-json-schema:
    url: https://github.com/ajevans99/swift-json-schema
    exactVersion: 0.11.2
targets:
  Yakamoz:
    type: application
    platform: macOS
    sources:
      - Sources/Yakamoz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.atkn.Yakamoz
        PRODUCT_NAME: Yakamoz
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: YakamozCore
  YakamozCore:
    type: framework
    platform: macOS
    sources:
      - Sources/YakamozCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.atkn.YakamozCore
        PRODUCT_NAME: YakamozCore
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: PositronicKit
        product: PositronicKit
      - package: PositronicKit
        product: PKShared
      - package: PositronicKit
        product: PKPrompt
      - package: PositronicKit
        product: PKOpenAIProvider
      - package: PositronicKit
        product: PKOpenRouterProvider
      - package: PositronicKit
        product: PKOllamaProvider
  YakamozTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/YakamozTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.atkn.YakamozTests
        PRODUCT_NAME: YakamozTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: YakamozCore
      - package: PositronicKit
        product: PKTestSupport
schemes:
  Yakamoz:
    build:
      targets:
        Yakamoz: all
        YakamozCore: all
    test:
      targets:
        - YakamozTests
